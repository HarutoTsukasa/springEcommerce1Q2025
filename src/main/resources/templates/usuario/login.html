<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeLeaf.org">

<head th:insert="~{usuario/template_user.html::head}"></head>

<body>

	<div th:insert="~{usuario/template_user.html::header}" th:if="${sesion == null}"></div>
	<div th:insert="~{usuario/template_user.html::usuarioCabecera}" th:unless="${sesion == null}"></div>



	<main id="main"><!--contenido-->
		<div class="container">
			<section></section>
			<header class="jumbotron my-4">
				<h1 class="display-3">Inicio de sesión</h1>
			</header>

			<form th:action="@{/usuario/acceder}" method="post">

				<div class="form-group">
					<label for="email">Email:</label>
					<input type="email" class="form-control" id="email" name="email" required
						placeholder="Ingrese su correo electrónico" autocomplete="off">
				</div>

				<div class="form-group">
					<label for="password">Contraseña:</label>
					<input type="password" class="form-control" id="password" name="password" required
						placeholder="Ingrese su contraseña" autocomplete="off">
				</div>
				<div class="col-sm-2">
					<button type="submit" class="btn btn-dark">Ingresar</button>
				</div>
			</form>
			<a th:href="@{/usuario/registro}" class="card-link">Si aún no tiene cuenta con nostros, registrese aquí</a>

		</div>
	</main>

	<div th:insert="~{usuario/template_user.html::footer}"></div>

	<a href="#" class="scroll-top d-flex align-items-center justify-content-center"><i
			class="bi bi-arrow-up-short"></i></a>

	<div id="preloader"></div>

	<div th:insert="~{usuario/template_user.html::jsFiles}"></div>

</body>

</html>
