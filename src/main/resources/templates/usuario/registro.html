<!DOCTYPE html>
<html lang="es" xmlns:th="http://thymeLeaf.org">

<head th:insert="~{usuario/template_user.html::head}"></head>

<body>

	<div th:insert="~{usuario/template_user.html::headerLogout}" th:if="${sesion == null}"></div>
	<div th:insert="~{usuario/template_user.html::headerLogin}" th:unless="${sesion == null}"></div>

	<!-- Hero Section -->
	<!--	<section class="hero-section">-->
	<!--	</section>-->

	<!-- Carrusel de Promociones -->
	<section class="container mb-5">
	</section>

	<!-- Productos -->
	<section class="container mb-5" id="productos">
		<h2 class="section-title">Spring eCommerce Registro de usuario</h2>
		<nav aria-label="breadcrumb">
			<ol class="breadcrumb">
				<li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
				<li class="breadcrumb-item active" aria-current="page">Registro</li>
			</ol>
		</nav>
	</section>

	<!-- Formulario de Registro -->
	<section class="container mb-5">
		<h2 class="section-title">Registro de Usuario</h2>
		<div class="row justify-content-center">
			<div class="col-md-8">
				<div class="card">
					<div class="card-body">
						<form method="post" th:action="@{/usuario/save}">
							<div class="row mb-3">
								<div class="col-md-6">
									<label for="firstName" class="form-label">Nombres</label>
									<input type="text" class="form-control" id="nombre" name="nombre"
										placeholder="Tu nombre" required autocomplete="off">
								</div>
								<div class="col-md-6">
									<label for="document" class="form-label">Documento</label>
									<input type="text" class="form-control" id="documento" name="documento"
										placeholder="Tu documento" required autocomplete="off">
								</div>
							</div>
							<div class="mb-3">
								<label for="email" class="form-label">Email</label>
								<input type="email" class="form-control" id="email" name="email"
									placeholder="tucorreo@ejemplo.com" required autocomplete="off">
							</div>
							<div class="row mb-3">
								<div class="col-md-6">
									<label for="password" class="form-label">Contraseña</label>
									<input type="password" class="form-control" id="password" name="password"
										placeholder="Crea una contraseña" required autocomplete="off">
								</div>
								<div class="col-md-6">
									<label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
									<input type="password" class="form-control" id="confirmPassword"
										placeholder="Repite tu contraseña" required autocomplete="off">
								</div>
							</div>
							<div class="mb-3">
								<label for="address" class="form-label">Dirección</label>
								<input type="text" class="form-control" id="direccion" name="direccion"
									placeholder="Tu dirección completa" required autocomplete="off">
							</div>
							<div class="row mb-3">
								<div class="col-md-6">
									<label for="phone" class="form-label">Teléfono</label>
									<input type="text" class="form-control" id="telefono" name="telefono"
										placeholder="Tu teléfono" required autocomplete="off">
								</div>
								<div class="col-md-6">
									<label for="username" class="form-label">User Name</label>
									<input type="text" class="form-control" id="username" name="username"
										placeholder="Nombre de usuario" required autocomplete="off">
								</div>
							</div>
							<div class="form-check mb-3">
								<input class="form-check-input" type="checkbox" id="terms">
								<label class="form-check-label" for="terms">
									Acepto los términos y condiciones
								</label>
							</div>
							<button type="submit" class="btn btn-primary w-100">Registrarse</button>
						</form>
					</div>
				</div>
			</div>
		</div>
	</section>

	<div th:insert="~{usuario/template_user.html::footer}"></div>

	<div th:insert="~{usuario/template_user.html::jsFiles}"></div>
</body>

</html>
